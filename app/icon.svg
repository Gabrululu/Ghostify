<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background circle for favicon visibility -->
  <defs>
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main ghost shape -->
  <g transform="translate(96, 96)">
    <!-- Ghost body -->
    <path d="M -40 -20 L -40 25 Q -40 45 -20 45 L 20 45 Q 40 45 40 25 L 40 -20 Q 40 -40 20 -40 L -20 -40 Q -40 -40 -40 -20 Z" 
          fill="url(#ghostGradient)" opacity="0.9"/>
    
    <!-- Ghost wave bottom -->
    <path d="M -40 25 Q -30 35 -20 25 Q -10 35 0 25 Q 10 35 20 25 Q 30 35 40 25" 
          fill="none" stroke="url(#ghostGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Left eye -->
    <circle cx="-15" cy="-10" r="7" fill="#0f172a"/>
    <circle cx="-15" cy="-10" r="4" fill="#e0f2fe"/>
    
    <!-- Right eye -->
    <circle cx="15" cy="-10" r="7" fill="#0f172a"/>
    <circle cx="15" cy="-10" r="4" fill="#e0f2fe"/>
    
    <!-- Subtle tech accent - circuit line -->
    <path d="M -25 10 L -10 10 L -10 20 L 10 20 L 10 10 L 25 10" 
          stroke="url(#ghostGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"
          opacity="0.6"/>
  </g>
</svg>